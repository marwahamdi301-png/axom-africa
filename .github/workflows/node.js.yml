# Workflow لعملية التثبيت والبناء التلقائي (CI)
# تم التعديل ليتناسب مع إمبراطورية بايا (Next.js 15 & React 19)

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # استخدام النسخ المستقرة التي تدعم Next.js 15
        node-version: [20.x, 22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      # هذا الأمر هو السر لتجاوز تعارض نسخ React 19
      run: npm install --legacy-peer-deps

    - name: Build Project
      # تنفيذ عملية البناء (Next.js Build)
      run: npm run build --if-present

    - name: Run Tests
      # تشغيل الاختبارات إذا كانت موجودة
      run: npm test --if-present
